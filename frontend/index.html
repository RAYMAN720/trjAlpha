<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TradePilot AI Scanner</title>
    <style>
      :root {
        color-scheme: dark;
        background: #101012;
        color: #f6f3eb;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body {
        margin: 0;
        min-width: 320px;
        min-height: 100vh;
        background:
          radial-gradient(circle at 0% 0%, rgba(51, 214, 159, 0.09), transparent 28rem),
          linear-gradient(135deg, #101012 0%, #171318 44%, #11120f 100%);
      }

      .boot-shell {
        display: grid;
        min-height: 100vh;
        place-items: center;
        padding: 1.5rem;
      }

      .boot-panel {
        width: min(100%, 440px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 8px;
        background: rgba(22, 21, 25, 0.94);
        box-shadow: 0 24px 70px rgba(0, 0, 0, 0.35);
        padding: 1.5rem;
      }

      .boot-panel p {
        margin: 0;
        color: #a8a29e;
      }

      .boot-panel strong {
        display: block;
        margin-bottom: 0.5rem;
        color: #33d69f;
        font-size: 0.75rem;
        letter-spacing: 0.18em;
        text-transform: uppercase;
      }
    </style>
  </head>
  <body>
    <div id="root">
      <main class="boot-shell">
        <section class="boot-panel">
          <strong>TradePilot AI Scanner</strong>
          <p>Loading secure dashboard...</p>
        </section>
      </main>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
