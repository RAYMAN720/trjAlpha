services:
  - type: web
    name: tradepilot-python-engine
    runtime: python
    plan: free
    rootDir: python-engine
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_ENGINE_ENV
        value: production
      - key: PYTHON_ENGINE_LOG_LEVEL
        value: INFO

  - type: web
    name: tradepilot-ai-scanner
    runtime: node
    plan: free
    rootDir: .
    buildCommand: cd backend && npm ci --include=dev && npm run prisma:generate:postgres && npm run build && cd ../frontend && npm ci --include=dev && npm run build
    startCommand: cd backend && npm run prisma:deploy:postgres && npm run start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: HOST
        value: 0.0.0.0
      - key: RUN_WORKERS_ON_START
        value: "true"
      - key: DATABASE_URL
        fromDatabase:
          name: tradepilot-ai-scanner-db
          property: connectionString
      - key: APP_OWNER_EMAIL
        value: rayanntchamba@gmail.com
      - key: APP_AUTH_SECRET
        generateValue: true
      - key: APP_AUTH_TOKEN_HOURS
        value: "12"
      - key: APP_ENABLE_PASSCODE_LOGIN
        value: "false"
      - key: RESEND_API_KEY
        sync: false
      - key: APP_EMAIL_FROM
        sync: false
      - key: AI_PRIMARY_PROVIDER
        value: mistral
      - key: AI_PROVIDER
        value: mistral
      - key: AI_FALLBACK_PROVIDER
        value: openai
      - key: AI_FALLBACK_ENABLED
        value: "true"
      - key: TECHNICAL_FALLBACK_ENABLED
        value: "true"
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4o-mini
      - key: MISTRAL_API_KEY
        sync: false
      - key: MISTRAL_MODEL
        value: mistral-small-latest
      - key: LOCAL_MODEL_PROVIDER
        value: none
      - key: LOCAL_MODEL_BASE_URL
        sync: false
      - key: LOCAL_MODEL_API_KEY
        sync: false
      - key: LOCAL_MODEL_MODEL
        sync: false
      - key: OLLAMA_ENABLED
        value: "false"
      - key: OLLAMA_BASE_URL
        value: http://localhost:11434
      - key: OLLAMA_MODEL
        value: qwen2.5:7b
      - key: AI_MAX_CALLS_PER_HOUR
        value: "10"
      - key: AI_MAX_CALLS_PER_DAY
        value: "100"
      - key: AI_CACHE_MINUTES
        value: "60"
      - key: AI_REQUEST_TIMEOUT_SECONDS
        value: "30"
      - key: AI_MAX_RETRIES
        value: "2"
      - key: AI_RETRY_BASE_DELAY_SECONDS
        value: "2"
      - key: AI_MIN_SIGNAL_SCORE
        value: "75"
      - key: AI_DAILY_BUDGET_USD
        value: "2"
      - key: AI_ALLOW_TECHNICAL_ONLY
        value: "true"
      - key: AI_REQUIRE_JSON_RESPONSE
        value: "true"
      - key: ALPACA_TRADING_ENV
        value: paper
      - key: ALPACA_TRADING_BASE_URL
        value: https://paper-api.alpaca.markets/v2
      - key: ALPACA_AUTH_MODE
        value: api_key
      - key: ALPACA_API_KEY_ID
        sync: false
      - key: ALPACA_API_SECRET_KEY
        sync: false
      - key: ALPACA_AUTH_BASE_URL
        value: https://authx.sandbox.alpaca.markets/v1
      - key: ALPACA_MARKET_DATA_BASE_URL
        value: https://data.alpaca.markets
      - key: ALPACA_STOCK_DATA_FEED
        value: iex
      - key: PAPER_TRADING_ENABLED
        value: "true"
      - key: ALLOW_LIVE_BROKER_TRADING
        value: "false"
      - key: AUTO_SUBMIT_BROKER_PAPER_ORDERS
        value: "false"
      - key: STOCK_PRICE_REFRESH_MS
        value: "5000"
      - key: STOCK_PRICE_BASE_URL
        value: https://query1.finance.yahoo.com
      - key: CRYPTO_PRICE_REFRESH_MS
        value: "5000"
      - key: CRYPTO_PRICE_BASE_URL
        value: https://api.binance.com
      - key: STOCK_EXECUTION_QUOTE_MAX_AGE_MINUTES
        value: "20"
      - key: CRYPTO_EXECUTION_QUOTE_MAX_AGE_MINUTES
        value: "3"
      - key: STOP_LOSS_REENTRY_COOLDOWN_HOURS
        value: "24"
      - key: MAX_ENTRY_PRICE_DRIFT_PERCENT
        value: "1"
      - key: NEWS_PROVIDER
        value: finnhub
      - key: FINNHUB_API_KEY
        sync: false
      - key: POLYGON_API_KEY
        sync: false
      - key: NEWS_REFRESH_INTERVAL_MINUTES
        value: "15"
      - key: NEWS_MAX_ARTICLES_PER_SCAN
        value: "50"
      - key: NEWS_AI_ANALYSIS_ENABLED
        value: "true"
      - key: NEWS_AI_TOP_N
        value: "10"
      - key: PYTHON_ENGINE_ENABLED
        value: "true"
      - key: PYTHON_ENGINE_URL
        value: https://tradepilot-python-engine.onrender.com
      - key: PYTHON_ENGINE_TIMEOUT_MS
        value: "8000"

databases:
  - name: tradepilot-ai-scanner-db
    plan: free
